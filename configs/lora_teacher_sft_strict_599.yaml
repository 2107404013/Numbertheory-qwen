stage: stage-6.2.1-teacher-lora-sft-strict
model_name: Qwen/Qwen2.5-Math-1.5B-Instruct
train_file: data/processed/train_number_theory_teacher_strict_599.jsonl
eval_file: data/processed/public_number_theory_eval.jsonl
output_dir: outputs/lora_teacher_sft_strict_599
train_log: results/lora_teacher_sft_strict_599_train_log.json

solution_field: teacher_solution
max_train_samples: -1
max_seq_len: 2048
min_assistant_tokens: 256

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - o_proj

learning_rate: 2.0e-5
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
bf16: true
logging_steps: 10
save_steps: 200
save_total_limit: 2
warmup_ratio: 0.05
weight_decay: 0.0
lr_scheduler_type: cosine
seed: 42

train_on_assistant_only: true
force_boxed_answer: true

training_prompt_template: |
  请一步步解答下面的数论题，并将最终答案写在 \boxed{} 中。

  题目：{problem}
